<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Lens circle -->
  <circle cx="14" cy="14" r="10" stroke="#85677b" stroke-width="2.5" fill="#f4eee8"/>
  <!-- Upward trend line inside lens -->
  <polyline points="8,18 11,15 14,16 18,10" stroke="#b565a7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Handle -->
  <line x1="21.5" y1="21.5" x2="29" y2="29" stroke="#85677b" stroke-width="3" stroke-linecap="round"/>
  <!-- Dot at peak -->
  <circle cx="18" cy="10" r="1.5" fill="#64bfa4"/>
</svg>
